# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user  www-data;
worker_processes  auto;

error_log  /var/log/nginx/error.log;
#error_log  /var/log/nginx/error.log  notice;
#error_log  /var/log/nginx/error.log  info;

pid        /run/nginx.pid;

# Load dynamic module files from the /etc/nginx/conf.modules.d/ directory.
# See http://nginx.org/en/docs/ngx_core_module.html#include
# for more information.
include /etc/nginx/conf.modules.d/*.conf;

events {
    worker_connections  19000;
    multi_accept        on;
    use                 epoll;
}

worker_rlimit_nofile 20000;

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $server_port'; 
    log_format rt_cache '$remote_addr - $upstream_cache_status [$time_local]'                     
                        '"$request" $status $body_bytes_sent '                     
                        '"$http_referer" "$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;
    server_tokens off;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;    

    keepalive_requests  30;
    keepalive_timeout  60;
    
    client_header_timeout  3m;     
    client_body_timeout    3m;     
    send_timeout           3m;
   
    open_file_cache max=1000 inactive=20s;     
    open_file_cache_valid 30s;     
    open_file_cache_min_uses 5;     
    open_file_cache_errors off;

    client_body_buffer_size      128k; 
    client_max_body_size         256m; 
    client_header_buffer_size    1k; 
    large_client_header_buffers  4 4k; 
    output_buffers               1 32k;
    postpone_output              1460;

    gzip  on;
    gzip_vary on; 
    gzip_min_length 10240; 
    #gzip_comp_level 5;
    gzip_proxied expired no-cache no-store private auth; 
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml; 
    gzip_disable "MSIE [1-6]\.";
    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;

    include /etc/nginx/sites-enabled/*.conf;
    server_names_hash_bucket_size 128;
}